# Prefix
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# General
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 0
set -g history-limit 50000
set -g display-time 4000
set -g focus-events on
set -g allow-passthrough on
set -g extended-keys on
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Vi mode
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel

# Prefix bindings
bind s split-window -h -c "#{pane_current_path}"
bind j split-window -v -l 40% -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
bind x copy-mode
bind w kill-pane
bind z resize-pane -Z
bind o rotate-window
bind e command-prompt -p "Rename window:" "rename-window '%%'"
bind i run-shell "tmux neww tmux-sessionizer"
bind y choose-tree -s
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"
bind a run-shell "tmux neww -n agenda '$SHELL -lc \"nvim -c \\\"lua require(\\\\\\\"orgmode\\\\\\\").action(\\\\\\\"agenda.agenda\\\\\\\")\\\"\"'"

# Alt bindings (forwarded from WezTerm CMD keys)
bind -n M-c new-window -c "#{pane_current_path}"
bind -n M-h previous-window
bind -n M-l next-window
bind -n M-s split-window -h -c "#{pane_current_path}"
bind -n M-j split-window -v -l 40% -c "#{pane_current_path}"
bind -n M-w kill-pane
bind -n M-z resize-pane -Z
bind -n M-x copy-mode
bind -n M-e command-prompt -p "Rename:" "rename-window '%%'"
bind -n M-i run-shell "tmux neww tmux-sessionizer"
bind -n M-y choose-tree -s
bind -n M-o rotate-window
bind -n M-u display-popup -E -w 90% -h 80% "~/.cargo/bin/claude-tmux"
bind -n M-r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"
bind -n M-d detach-client

# Vim-aware pane navigation (smart-splits.nvim sets @pane-is-vim variable)
bind-key -n C-h if -F "#{@pane-is-vim}" 'send-keys C-h' 'select-pane -L'
bind-key -n C-j if -F "#{@pane-is-vim}" 'send-keys C-j' 'select-pane -D'
bind-key -n C-k if -F "#{@pane-is-vim}" 'send-keys C-k' 'select-pane -U'
bind-key -n C-l if -F "#{@pane-is-vim}" 'send-keys C-l' 'select-pane -R'

# Status bar
set -g status-position top
set -g status-interval 5
set -g status-left-length 30
set -g status-right-length 50

# Source theme
source-file ~/.config/tmux/themes/astrodark.conf

# Plugins (TPM)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Plugin config
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Initialize TPM (keep at bottom)
run '~/.tmux/plugins/tpm/tpm'
